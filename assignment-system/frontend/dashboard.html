<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MCQ Assignment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-graduation-cap fa-2x"></i>
                <h5 class="mt-2">MCQ System</h5>
            </div>
            <div class="sidebar-menu">
                <a href="#" class="menu-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="#" class="menu-item" data-page="assignments">
                    <i class="fas fa-tasks"></i> Assignments
                </a>
                <a href="#" class="menu-item" data-page="results">
                    <i class="fas fa-chart-bar"></i> Results
                </a>
                <a href="#" class="menu-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
            <div class="sidebar-footer">
                <span id="welcomeUser"></span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Dashboard Content -->
            <div id="dashboardContent">
                <h2 class="mb-4">Dashboard</h2>
                <div class="row">
                    <div class="col-md-4">
                        <div class="stats-card">
                            <div class="stats-icon">
                                <i class="fas fa-book"></i>
                            </div>
                            <div class="stats-details">
                                <h3 id="totalAssignments">0</h3>
                                <p>Total Assignments</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-card">
                            <div class="stats-icon" style="background: #27ae60;">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="stats-details">
                                <h3 id="completedAssignments">0</h3>
                                <p>Completed</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-card">
                            <div class="stats-icon" style="background: #e67e22;">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="stats-details">
                                <h3 id="pendingAssignments">0</h3>
                                <p>Pending</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Teacher Section -->
                <div id="teacherSection" style="display: none;">
                    <hr>
                    <h3 class="mb-3">Create New Assignment</h3>
                    <div class="card p-4">
                        <form id="createAssignmentForm">
                            <div class="row">
                                <div class="col-md-4">
                                    <input type="text" class="form-control" id="assignmentTitle" placeholder="Assignment Title" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="text" class="form-control" id="assignmentSubject" placeholder="Subject" required>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-primary">Create Assignment</button>
                                </div>
                            </div>
                        </form>
                    </div>
                    
                    <div class="card mt-4" id="questionsSection" style="display: none;">
                        <div class="card-header">
                            <h5>Add Questions</h5>
                        </div>
                        <div class="card-body">
                            <div id="questionsContainer"></div>
                            <button class="btn btn-secondary mt-2" onclick="addQuestionField()">Add Question</button>
                            <button class="btn btn-success mt-2" onclick="saveQuestions()">Save Questions</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Assignments Content -->
            <div id="assignmentsContent" style="display: none;">
                <h2 class="mb-4">Available Assignments</h2>
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Subject</th>
                                    <th>Total Questions</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="assignmentsTable">
                                <!-- Dynamic content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Results Content -->
            <div id="resultsContent" style="display: none;">
                <h2 class="mb-4">My Results</h2>
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Assignment</th>
                                    <th>Score</th>
                                    <th>Percentage</th>
                                    <th>Submitted</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable">
                                <!-- Dynamic content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
