<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results - MCQ Assignment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card result-card">
                    <div class="card-body text-center p-5">
                        <div class="mb-4">
                            <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
                        </div>
                        
                        <h2 class="mb-4">Quiz Completed!</h2>
                        
                        <div id="resultContent">
                            <div class="result-stats mb-4">
                                <div class="row">
                                    <div class="col-6">
                                        <h5>Total Questions</h5>
                                        <p class="display-6" id="totalQuestions">0</p>
                                    </div>
                                    <div class="col-6">
                                        <h5>Correct Answers</h5>
                                        <p class="display-6" id="correctAnswers">0</p>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-6">
                                        <h5>Wrong Answers</h5>
                                        <p class="display-6" id="wrongAnswers">0</p>
                                    </div>
                                    <div class="col-6">
                                        <h5>Percentage</h5>
                                        <p class="display-6" id="percentage">0%</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="score-circle mb-4">
                                <h3>Your Score</h3>
                                <div class="display-1" id="score">0/0</div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
                            <button onclick="window.print()" class="btn btn-secondary">
                                <i class="fas fa-print"></i> Print
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
